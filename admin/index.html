<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Adrián Salcedo Toca</title>
  <link rel="icon" type="image/png" href="/media/images/sat.png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: auto; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  </style>
</head>
<body>
  <p id="token-debug" style="position:fixed;bottom:0;left:0;right:0;z-index:9999;background:#222;color:#0f0;padding:6px;font:12px monospace;display:none;"></p>
  <script>
    (function(){
      var d = document.getElementById('token-debug');
      function log(m) { d.style.display = 'block'; d.textContent = m; }

      var stored = localStorage.getItem('github-token');
      if (stored) {
        try {
          var parsed = JSON.parse(stored);
          if (parsed.token) {
            log('Token found: ' + parsed.token.substring(0, 10) + '... scope=' + parsed.scope);
            var tok = parsed.token;

            fetch('https://api.github.com/user', {
              headers: { 'Authorization': 'Bearer ' + tok }
            })
            .then(function(r) { return r.json().then(function(j) { return { status: r.status, login: j.login || j.message, body: JSON.stringify(j).substring(0, 100) }; }); })
            .then(function(r1) {
              return fetch('https://api.github.com/user/repos?per_page=100&type=owner', {
                headers: { 'Authorization': 'Bearer ' + tok }
              })
              .then(function(r) { return r.json().then(function(repos) { return { user: r1, repos: repos }; }); });
            })
            .then(function(data) {
              var repos = data.repos;
              if (!Array.isArray(repos)) {
                log('Repo list error: ' + (repos.message || JSON.stringify(repos).substring(0, 80)));
                return;
              }
              var found = repos.filter(function(r) { return r.name === 'adriansalcedo'; });
              var names = repos.map(function(r) { return r.name; }).join(', ');
              if (found.length > 0) {
                log('Token: @' + data.user.login + ' | Repo FOUND: ' + found[0].name + ' (private=' + found[0].private + ')');
              } else {
                log('Token: @' + data.user.login + ' | Repo NOT in user repos. Repos: ' + names.substring(0, 120));
              }
            })
            .catch(function(e) {
              log('API error: ' + e.message);
            });
          } else {
            log('Token stored but no token field');
          }
        } catch(e) {
          log('Parse error: ' + e.message);
        }
      }
    })();
  </script>
  <script src="https://unpkg.com/netlify-cms@^2.10.192/dist/netlify-cms.js"></script>
  <script>
    CMS.init();
  </script>
</body>
</html>
